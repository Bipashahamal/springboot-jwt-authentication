spring.application.name=employee-management
server.port=8080
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db
spring.datasource.username=root
spring.datasource.password=mysql098

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
# Secret key for JWT token signing (must be at least 256 bits/32 characters for HS256)
# IMPORTANT: Change this to a strong, random secret in production!
jwt.secret=my_super_secret_key_123456_my_super_secret_key_123456
# JWT token expiration time in milliseconds (3600000 = 1 hour)
jwt.expiration=1h

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Springdoc-openapi Configuration - Force OpenAPI 3.0.0 for better MultipartFile support
springdoc.api-docs.version=OPENAPI_3_0
# Enable proper parameter resolving for mul
tipart
springdoc.swagger-ui.use-root-path=true
# Ensure multipart parameters are properly resolved
springdoc.model-and-view-allowed=true